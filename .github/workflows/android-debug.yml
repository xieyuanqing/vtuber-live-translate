name: Android Debug Build

"on":
  push:
    branches:
      - main
    paths:
      - "android/**"
      - ".github/workflows/android-debug.yml"
  pull_request:
    branches:
      - main
    paths:
      - "android/**"
      - ".github/workflows/android-debug.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  assemble-debug:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests, Lint and assemble debug APK
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleDebug --stacktrace

      - name: Upload test and lint reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-lint-reports
          path: |
            android/app/build/reports/tests/
            android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveTranslate-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
